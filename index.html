<!DOCTYPE html>
<html lang="en">
<head>
<meta name="game-uuid" content="43c76846-39c9-45b7-ad08-76c817b375a3" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Quick Draw</title>
<script src="./aigram-bridge.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#fbecd2; --ink-soft:#c9a980; --gold:#ffcb52; --gold-deep:#e08a2a; --rust:#e0492f; --red:#ff5a3c;
    --wood-1:#241019; --wood-2:#3a1c1e; --amber:#caa05a;
    --glass:linear-gradient(150deg, rgba(58,28,30,.82), rgba(36,16,25,.74));
    --glass-strong:linear-gradient(155deg, rgba(70,36,34,.94), rgba(40,18,26,.88));
    --glass-border:rgba(255,200,120,.28);
    --glass-shadow:0 16px 44px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,210,140,.18);
    --blur:saturate(140%) blur(12px);
    --font:"Oswald","PingFang SC",system-ui,sans-serif;
    --display:"Rye","Oswald",serif;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; overflow:hidden; background:linear-gradient(180deg,#2a2148 0%,#b5547a 56%,#f2a850 100%); font-family:var(--font); -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  #c { display:block; width:100%; height:100%; touch-action:none; }
  .hud { position:fixed; pointer-events:none; z-index:5; }

  /* Wordmark — title state */
  #wordmark { top:max(70px,calc(env(safe-area-inset-top) + 54px)); left:50%; transform:translateX(-50%); width:max-content; max-width:94vw; text-align:center; transition:opacity .4s ease, transform .4s ease; }
  #wordmark .b { display:block; font-family:var(--display); font-size:clamp(38px,13vw,66px); line-height:1; color:var(--gold); text-shadow:0 3px 0 #7a3a12, 0 6px 18px rgba(0,0,0,.6); letter-spacing:.01em; }
  #wordmark .sub { display:block; font-weight:600; font-size:13px; letter-spacing:.28em; color:var(--ink); margin-top:14px; text-transform:uppercase; text-shadow:0 2px 6px rgba(0,0,0,.5); }
  #wordmark.hidden { opacity:0; transform:translate(-50%,-14px); }

  /* Wins counter — top left */
  #wins { top:max(20px,calc(env(safe-area-inset-top) + 8px)); left:14px; display:none; align-items:center; gap:7px; font-family:var(--display); font-size:22px; color:var(--gold); text-shadow:0 2px 4px rgba(0,0,0,.6); }
  #wins.show { display:flex; }
  #wins .star { width:20px; height:20px; }
  #wins .star path { fill:var(--gold); stroke:#7a3a12; stroke-width:1.4; stroke-linejoin:round; }

  /* Opponent nameplate — top center */
  #opp { top:max(22px,calc(env(safe-area-inset-top) + 10px)); left:50%; transform:translateX(-50%); font-weight:700; font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink); text-shadow:0 2px 6px rgba(0,0,0,.6); opacity:0; transition:opacity .3s ease; text-align:center; white-space:nowrap; }
  #opp.show { opacity:1; }
  #opp b { display:block; font-family:var(--display); font-size:22px; color:#fff; letter-spacing:.01em; margin-top:2px; }

  /* The big DRAW! flash */
  #draw { top:38%; left:50%; transform:translate(-50%,-50%) scale(.6); opacity:0; font-family:var(--display); font-size:clamp(56px,20vw,120px); line-height:1; color:#fff; text-shadow:0 0 30px rgba(255,90,60,.9), 0 4px 0 #7a1209, 0 8px 26px rgba(0,0,0,.7); }
  #draw.show { animation:qd-draw .35s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes qd-draw { 0%{opacity:0; transform:translate(-50%,-50%) scale(.5);} 60%{opacity:1; transform:translate(-50%,-50%) scale(1.12);} 100%{opacity:1; transform:translate(-50%,-50%) scale(1);} }

  /* Status line under the action */
  #status { top:54%; left:50%; transform:translate(-50%,-50%); font-family:var(--display); font-size:clamp(26px,8.5vw,44px); line-height:1; text-align:center; white-space:nowrap; color:#fff; text-shadow:0 3px 10px rgba(0,0,0,.7); opacity:0; transition:opacity .2s ease; }
  #status.show { opacity:1; }
  #status.tone-wait { color:var(--ink-soft); font-family:var(--font); font-weight:600; font-size:clamp(16px,5vw,24px); letter-spacing:.18em; text-transform:uppercase; }
  #status.tone-win  { color:var(--gold); text-shadow:0 0 22px rgba(255,200,80,.7), 0 3px 8px rgba(0,0,0,.6); }
  #status.tone-lose { color:var(--ink-soft); }
  #status.tone-foul { color:var(--red); text-shadow:0 0 22px rgba(255,80,60,.8), 0 3px 8px rgba(0,0,0,.6); }
  #status.bump { animation:qd-bump .35s cubic-bezier(.3,1.5,.5,1); }
  @keyframes qd-bump { 0%{transform:translate(-50%,-50%) scale(1.3);} 100%{transform:translate(-50%,-50%) scale(1);} }

  /* Guide */
  #guide { bottom:calc(16% + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; transition:opacity .45s ease; }
  #guide.show { opacity:1; }
  #guide .g-finger { position:relative; width:54px; height:54px; transform-origin:50% 24%; animation:g-tap 1s ease-in-out infinite; }
  #guide .g-finger svg { width:100%; height:100%; display:block; fill:rgba(255,255,255,.96); filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
  #guide .g-label { font-weight:700; font-size:15px; letter-spacing:.04em; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.6); text-transform:uppercase; text-align:center; max-width:80vw; }
  @keyframes g-tap { 0%,100%{transform:translateY(-4px) scale(1);} 46%,60%{transform:translateY(3px) scale(.92);} }

  /* Game over card */
  #over { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(12,6,14,.62); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); z-index:30; padding:24px; pointer-events:auto; }
  #over.show { display:flex; animation:qd-fade .25s ease; }
  @keyframes qd-fade { from{opacity:0;} to{opacity:1;} }
  #over .card { text-align:center; max-width:330px; width:100%; background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); color:var(--ink); border:1px solid var(--glass-border); border-radius:22px; box-shadow:var(--glass-shadow), 0 24px 60px rgba(0,0,0,.55); padding:28px 26px 24px; display:flex; flex-direction:column; align-items:center; animation:qd-rise .34s cubic-bezier(.2,1.1,.4,1); }
  @keyframes qd-rise { from{transform:translateY(18px) scale(.96); opacity:0;} to{transform:none; opacity:1;} }
  #over .tag { font-weight:700; font-size:11px; letter-spacing:.24em; color:var(--rust); text-transform:uppercase; margin:0 0 6px; }
  #over h1 { font-family:var(--display); font-size:clamp(26px,8vw,34px); color:#fff; margin:0 0 4px; line-height:1.05; }
  #over .killer { font-weight:600; font-size:14px; color:var(--ink-soft); margin:0 0 18px; }
  #over .killer b { color:var(--gold); }
  #over .rows { display:flex; gap:14px; justify-content:center; width:100%; }
  #over .stat { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:rgba(255,255,255,.06); border:1px solid rgba(255,200,120,.2); border-radius:16px; padding:12px 8px; }
  #over .stat .k { font-weight:700; font-size:10px; letter-spacing:.14em; color:var(--ink-soft); text-transform:uppercase; }
  #over .stat .v { font-family:var(--display); font-size:34px; color:#fff; line-height:1; }
  #over .stat.best .v { color:var(--gold); }
  #over .btns { display:flex; flex-direction:column; gap:10px; width:100%; margin-top:22px; }
  .btn-cta, .btn-ghost { pointer-events:auto; width:100%; min-height:48px; border-radius:999px; font-family:var(--display); font-weight:400; letter-spacing:.03em; cursor:pointer; -webkit-tap-highlight-color:transparent; border:none; text-transform:uppercase; transition:transform .12s ease, box-shadow .12s ease, background .2s ease; }
  .btn-cta { font-size:20px; color:#3a1408; background:linear-gradient(150deg, var(--gold), var(--gold-deep)); box-shadow:0 10px 24px rgba(224,138,42,.45), inset 0 1px 0 rgba(255,255,255,.5); }
  .btn-cta:active { transform:translateY(2px); }
  .btn-ghost { font-size:15px; font-family:var(--font); font-weight:600; color:var(--ink); background:rgba(255,255,255,.08); border:1px solid rgba(255,200,120,.24); }
  .btn-ghost:active { transform:translateY(2px); background:rgba(255,255,255,.14); }

  /* Champion pill + leaderboard (shared pattern) */
  #lb { position:fixed; top:max(20px,calc(env(safe-area-inset-top) + 8px)); right:12px; z-index:6; pointer-events:auto; display:none; }
  #lb.show { display:block; }
  .lbrow { display:flex; align-items:center; gap:7px; background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--glass-border); box-shadow:0 8px 20px rgba(0,0,0,.4); border-radius:999px; padding:5px 14px 5px 6px; font-weight:700; font-size:15px; color:var(--ink); line-height:1; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .12s ease; }
  .lbrow:active { transform:scale(.96); }
  .lbrow .crown { width:16px; height:16px; flex:0 0 auto; }
  .lbrow .crown path { fill:var(--gold); stroke:rgba(120,60,10,.5); stroke-width:1.2; stroke-linejoin:round; }
  .lbrow .av, .lbrow .avf { width:25px; height:25px; border-radius:50%; border:1.5px solid rgba(255,210,140,.6); box-shadow:0 1px 4px rgba(0,0,0,.4); flex:0 0 auto; object-fit:cover; }
  .lbrow .avf { background:linear-gradient(150deg, var(--gold), var(--gold-deep)); color:#3a1408; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
  .lbrow .nm { max-width:66px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lbrow .sc { color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums; }
  .lbrow.me .nm { color:var(--gold); }
  #lbFull { position:fixed; inset:0; display:none; z-index:40; padding:22px; align-items:center; justify-content:center; background:rgba(12,6,14,.62); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); pointer-events:auto; }
  #lbFull.show { display:flex; animation:qd-fade .25s ease; }
  #lbFull .lcard { background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--glass-border); border-radius:22px; width:100%; max-width:380px; max-height:84vh; display:flex; flex-direction:column; padding:22px 18px 18px; box-shadow:var(--glass-shadow), 0 24px 60px rgba(0,0,0,.55); animation:qd-rise .34s cubic-bezier(.2,1.1,.4,1); }
  #lbFull h2 { font-family:var(--display); font-size:24px; color:#fff; margin:0 0 6px; text-align:center; }
  #lbFull .lsub { text-align:center; font-weight:600; font-size:11px; letter-spacing:.18em; color:var(--ink-soft); text-transform:uppercase; margin:0 0 16px; }
  #lblist { display:flex; flex-direction:column; gap:8px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px; }
  .lb-download-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:34px 18px 38px; text-align:center; color:var(--ink,#fff);
  }
  .lb-download-state .ico { font-size:34px; line-height:1; }
  .lb-download-state .txt { max-width:260px; font-size:14px; line-height:1.45; opacity:.72; }
  .lb-download-state .btn {
    display:inline-flex; align-items:center; justify-content:center; min-height:40px;
    padding:0 16px; border-radius:999px; border:1px solid rgba(255,255,255,.32);
    background:rgba(255,255,255,.14); color:inherit; text-decoration:none;
    font-size:13px; font-weight:700; letter-spacing:0; -webkit-tap-highlight-color:transparent;
    transition:background .15s ease, transform .15s ease;
  }
  .lb-download-state .btn:active { background:rgba(255,255,255,.22); transform:scale(.97); }

  .lfrow { display:flex; align-items:center; gap:11px; border:1px solid rgba(255,200,120,.18); border-radius:14px; background:rgba(255,255,255,.05); padding:9px 14px 9px 11px; cursor:pointer; font-weight:600; font-size:16px; color:var(--ink); line-height:1; -webkit-tap-highlight-color:transparent; transition:transform .12s ease, background .2s ease; }
  .lfrow:active { transform:scale(.985); background:rgba(255,255,255,.1); }
  .lfrow .rk { font-family:var(--display); font-size:15px; min-width:30px; text-align:center; color:var(--ink-soft); }
  .lfrow .av, .lfrow .avf { width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(255,210,140,.6); box-shadow:0 1px 5px rgba(0,0,0,.4); flex:0 0 auto; object-fit:cover; }
  .lfrow .avf { background:linear-gradient(150deg, var(--gold), var(--gold-deep)); color:#3a1408; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; }
  .lfrow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lfrow .sc { color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums; }
  .lfrow.me { background:linear-gradient(150deg, rgba(255,203,82,.2), rgba(224,138,42,.14)); border-color:rgba(255,203,82,.4); }
  .lfrow.me .nm, .lfrow.me .rk { color:var(--gold); }
  #lbClose { margin-top:16px; align-self:stretch; min-height:46px; border:none; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,200,120,.24); color:var(--ink); font-family:var(--display); font-size:17px; letter-spacing:.03em; cursor:pointer; -webkit-tap-highlight-color:transparent; text-transform:uppercase; transition:transform .12s ease, background .2s ease; }
  #lbClose:active { transform:translateY(2px); background:rgba(255,255,255,.14); }

  @media (prefers-reduced-motion: reduce) { #guide .g-finger { animation:none; transform:translateY(0); } #over.show,#over .card,#lbFull.show,#lbFull .lcard,#draw.show,#status.bump { animation:none; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="wordmark" class="hud"><span class="b">Quick Draw</span><span class="sub">fastest hand in the feed</span></div>
  <div id="wins" class="hud"><svg class="star" viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 9.3 L16.5 14 L18.5 21 L12 17 L5.5 21 L7.5 14 L2 9.3 L9 9 Z"/></svg><span id="winsN">0</span></div>
  <div id="opp" class="hud">VS<b id="oppN">—</b></div>
  <div id="draw" class="hud">DRAW!</div>
  <div id="status" class="hud"></div>
  <div id="guide" class="hud">
    <div class="g-finger"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z"/></svg></div>
    <div class="g-label">Tap the instant it says DRAW</div>
  </div>
  <div id="lb"></div>
</div>

<div id="lbFull"><div class="lcard"><h2>Most Wanted</h2><p class="lsub">Most duels won</p><div id="lblist"></div><button id="lbClose">Close</button></div></div>

<div id="over"><div class="card">
  <p class="tag">Six feet under</p>
  <h1>You got out-drawn</h1>
  <p class="killer">by <b id="finalKiller">The Drifter</b></p>
  <div class="rows">
    <div class="stat"><span class="k">Duels won</span><span class="v" id="finalWins">0</span></div>
    <div class="stat best"><span class="k">Best draw</span><span class="v" id="finalBest">—</span></div>
  </div>
  <div class="btns"><button class="btn-cta" id="again">Draw again</button><button class="btn-ghost" id="overRank">View ranking</button></div>
</div></div>

<script type="module">
import { startGame } from './game.js';
const $ = (s) => document.querySelector(s);
const canvas = $('#c'), wordmarkEl = $('#wordmark'), winsEl = $('#wins'), oppEl = $('#opp'), drawEl = $('#draw'), statusEl = $('#status'), guideEl = $('#guide'), overEl = $('#over');
let started = false, bumpT = null;

let preRunBest = 0;   // my best WINS on the wall before this run (for score_beat window)
function snapshotPreRunBest(){ const A = window.Aigram, meId = A && String(A.telegramId);
  if (meId && lbData.rows.length){ const me = lbData.rows.find(r => String(r.user_id) === meId); preRunBest = me ? Number(me.score)||0 : 0; } else preRunBest = 0; }

function enterPlay(){ if (started) return; started = true; snapshotPreRunBest(); wordmarkEl.classList.add('hidden'); guideEl.classList.remove('show'); winsEl.classList.add('show'); oppEl.classList.add('show'); }

const fmtMs = (ms) => ms > 0 ? Math.round(ms) + 'ms' : '—';
const hud = {
  setWins(n){ $('#winsN').textContent = String(n); },
  setBest(ms){ /* tracked in game; shown on death card */ bestMs = ms; },
  setOpponent(name){ $('#oppN').textContent = name; oppEl.classList.add('show'); },
  setStatus(text, tone){
    statusEl.textContent = text || '';
    statusEl.className = 'hud' + (text ? ' show' : '') + (tone ? ' tone-' + tone : '');
    if (text){ statusEl.classList.remove('bump'); void statusEl.offsetWidth; statusEl.classList.add('bump'); }
  },
  flashDraw(on){ if (on){ drawEl.classList.remove('show'); void drawEl.offsetWidth; drawEl.classList.add('show'); } else drawEl.classList.remove('show'); drawEl.style.opacity = on ? '' : '0'; },
  setDead(payload){
    if (!payload){ overEl.classList.remove('show'); return; }   // just hide the overlay
    started = false;                                            // run ended → next enterPlay re-arms
    $('#finalWins').textContent = String(payload.wins);
    $('#finalBest').textContent = fmtMs(payload.best * 1000); // best is stored in seconds → ms for display
    $('#finalKiller').textContent = payload.killer || 'The Drifter';
    overEl.classList.add('show');
    trySendBeatNotify(payload.wins);
    setTimeout(refreshLB, 1200);
  },
  setReady(on){ guideEl.classList.toggle('show', on !== false && !started); },
};
let bestMs = 0;

const api = startGame({ canvas, hud });

addEventListener('pointerdown', (e) => {
  if (overEl.classList.contains('show')) return;
  if (e.target.closest('#lb, #lbFull')) return;
  enterPlay();
  api.onTap();
}, { passive:true });

// Replaying from the game-over card → go straight into the first duel (no attract):
// the player is already engaged.
$('#again').addEventListener('click', () => { enterPlay(); api.restart(); });
$('#overRank').addEventListener('click', openLbFull);

// ── leaderboard (shared pattern) ──
const lbEl = $('#lb'), lbFullEl = $('#lbFull'), lblistEl = $('#lblist');

const ALTERU_APP_URL = 'https://apps.apple.com/app/id6769646546';
const LB_DOWNLOAD_TEXT = (navigator.language || '').toLowerCase().startsWith('zh')
  ? { hint: '在 AlterU 中打开即可查看排行榜', cta: '下载 AlterU' }
  : { hint: 'Open in AlterU to view the leaderboard.', cta: 'Get AlterU on the App Store' };
function renderLBDownload(){
  lbData = { rows: [], meId: '' };
  if (lbEl) lbEl.classList.remove('show');
  lblistEl.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'lb-download-state';
  const icon = document.createElement('span');
  icon.className = 'ico';
  icon.textContent = '🏆';
  const text = document.createElement('span');
  text.className = 'txt';
  text.textContent = LB_DOWNLOAD_TEXT.hint;
  const link = document.createElement('a');
  link.className = 'btn';
  link.href = ALTERU_APP_URL;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = LB_DOWNLOAD_TEXT.cta;
  box.append(icon, text, link);
  lblistEl.appendChild(box);
}
let lbData = { rows:[], meId:'' };
function lbInitial(name){ const d = document.createElement('span'); d.className='avf'; d.textContent = ((name||'?').trim().charAt(0)||'?').toUpperCase(); return d; }
function lbAvatar(r){ if (r.head_url){ const img = document.createElement('img'); img.className='av'; img.src=r.head_url; img.alt=''; img.draggable=false; img.onerror=()=>img.replaceWith(lbInitial(r.user_name)); return img; } return lbInitial(r.user_name); }
function lbChampionPill(r, isMe){ const row = document.createElement('div'); row.className='lbrow'+(isMe?' me':''); row.innerHTML='<svg class="crown" viewBox="0 0 24 24"><path d="M3 18 L2 7 L8 12 L12 4 L16 12 L22 7 L21 18 Z"/></svg>'; row.appendChild(lbAvatar(r)); const nm=document.createElement('span'); let name=(r.user_name||'?').trim(); if(name.length>8)name=name.slice(0,8)+'…'; nm.className='nm'; nm.textContent=isMe?'YOU':name; row.appendChild(nm); const sc=document.createElement('span'); sc.className='sc'; sc.textContent=String(Number(r.score)||0); row.appendChild(sc); row.addEventListener('click', openLbFull); return row; }
function lbFullRow(r, isMe){ const row=document.createElement('div'); row.className='lfrow'+(isMe?' me':''); const rk=document.createElement('span'); rk.className='rk'; rk.textContent='#'+r.rank; row.appendChild(rk); row.appendChild(lbAvatar(r)); const nm=document.createElement('span'); nm.className='nm'; nm.textContent=isMe?'YOU':(r.user_name||'?'); row.appendChild(nm); const sc=document.createElement('span'); sc.className='sc'; sc.textContent=String(Number(r.score)||0); row.appendChild(sc); if(!isMe && r.user_id){ row.addEventListener('click', ()=>window.Aigram&&window.Aigram.openAigramProfile(r.user_id)); } return row; }
function openLbFull(){
  const A = window.Aigram;
  if (!A || !A.canRank) { renderLBDownload(); lbFullEl.classList.add('show'); return; }
  lblistEl.innerHTML=''; for (const r of lbData.rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id)===lbData.meId)); lbFullEl.classList.add('show'); refreshLB(); }
$('#lbClose').addEventListener('click', ()=>lbFullEl.classList.remove('show'));
function renderLB(rows, meId){ if(!rows.length){ lbEl.classList.remove('show'); return; } rows=rows.slice().sort((a,b)=>(a.rank||999)-(b.rank||999)); lbData={rows,meId}; lbEl.innerHTML=''; lbEl.appendChild(lbChampionPill(rows[0], String(rows[0].user_id)===meId)); lbEl.classList.add('show'); }
window.__lbRender = renderLB;
async function refreshLB(){ const A=window.Aigram; if(!A||!A.canRank){ if(lbFullEl.classList.contains('show')) renderLBDownload(); return; } try { const res=await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id='+A.gameUuid,'GET'); const rows=Array.isArray(res)?res:(res&&res.data)||[]; renderLB(rows, String(A.telegramId)); } catch(e){} }
async function trySendBeatNotify(myScore){ const A=window.Aigram; if(!A||!A.canRank||!A.telegramId) return; if(myScore<=preRunBest) return; try { const res=await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id='+A.gameUuid,'GET'); const rows=Array.isArray(res)?res:(res&&res.data)||[]; const meId=String(A.telegramId); const beaten=rows.filter(r=>String(r.user_id)!==meId).map(r=>({id:String(r.user_id),score:Number(r.score)||0})).filter(r=>r.score<myScore&&r.score>preRunBest).sort((a,b)=>b.score-a.score)[0]; if(!beaten) return; A.postAigramAPI('/note/aigram/ai/game/record/play', { session_id:A.gameUuid, event:'score_beat', config_json:{ actions:[{ type:'notify', target_user_id:beaten.id, image:{ ref_url:'https://yinxinghuan.github.io/games/posters/quick-draw.png', prompt:'Two low-poly voxel gunslingers in a dusty Wild-West standoff at golden dusk, hands hovering over holsters.' }, message:{ template:'{sender_name} out-drew your record — '+Math.round(myScore)+' duels won on Quick Draw.', variables:['sender_name'] } }] } }); } catch(e){} }
refreshLB();
</script>
